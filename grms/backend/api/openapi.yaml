openapi: 3.0.3
info:
  title: GRMS API
  description: |
    Guest Room Management System API for hotel smart door access.
    
    ## Authentication
    - **Guest users**: Use `/v1/auth/login` to get a JWT token
    - **Staff**: Use `/v1/backoffice/auth/login` to get a staff JWT token
    
    Include the token in the `Authorization` header:
    ```
    Authorization: Bearer <token>
    ```
  version: 2.0.0
  contact:
    name: GRMS Team

servers:
  - url: http://localhost:4000
    description: Local development

tags:
  - name: Auth
    description: User authentication
  - name: Mobile
    description: Mobile app endpoints
  - name: Backoffice
    description: Staff backoffice endpoints
  - name: Rooms
    description: Room management
  - name: Legacy
    description: Legacy API compatibility

paths:
  /:
    get:
      summary: Health check
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: GRMS API running

  /v1/auth/signup:
    post:
      tags: [Auth]
      summary: Create a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                name:
                  type: string
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Email already exists

  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials

  /v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user info
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User info
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'

  /v1/mobile/grants:
    get:
      tags: [Mobile]
      summary: Get active access grants for the user
      description: |
        Returns all active grants with the secret_base needed for BLE authentication.
        The app should derive secret_door using HKDF-SHA256 for each door.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Active grants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileGrantsResponse'

  /v1/backoffice/auth/login:
    post:
      tags: [Backoffice]
      summary: Staff login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffAuthResponse'

  /v1/backoffice/assign:
    post:
      tags: [Backoffice]
      summary: Assign room access to a user
      security:
        - staffAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_email, from_ts, to_ts]
              properties:
                user_email:
                  type: string
                  format: email
                room_id:
                  type: string
                  format: uuid
                room_number:
                  type: string
                  description: Alternative to room_id
                from_ts:
                  type: integer
                  description: Unix timestamp (seconds)
                to_ts:
                  type: integer
                  description: Unix timestamp (seconds)
      responses:
        '201':
          description: Access granted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignResponse'
        '404':
          description: User or room not found

  /v1/backoffice/revoke:
    post:
      tags: [Backoffice]
      summary: Revoke an access grant
      security:
        - staffAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [grant_id]
              properties:
                grant_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Access revoked
        '404':
          description: Grant not found

  /v1/backoffice/events:
    get:
      tags: [Backoffice]
      summary: Get access events
      security:
        - staffAuth: []
      parameters:
        - name: door_id
          in: query
          schema:
            type: string
            format: uuid
        - name: from_ts
          in: query
          schema:
            type: integer
        - name: to_ts
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccessEvent'

  /v1/backoffice/doors:
    get:
      tags: [Backoffice]
      summary: Get door statuses
      security:
        - staffAuth: []
      responses:
        '200':
          description: List of doors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DoorStatus'

  /v1/rooms:
    get:
      tags: [Rooms]
      summary: List all rooms
      responses:
        '200':
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Room'

  # Legacy endpoints
  /rooms:
    get:
      tags: [Legacy]
      summary: List rooms (legacy format)
      responses:
        '200':
          description: Rooms in legacy format

  /clients:
    get:
      tags: [Legacy]
      summary: List clients (legacy format)
      responses:
        '200':
          description: Clients in legacy format

  /logs:
    get:
      tags: [Legacy]
      summary: List logs (legacy format)
      responses:
        '200':
          description: Logs in legacy format

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    staffAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        phone:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        expires_in:
          type: integer
        user:
          $ref: '#/components/schemas/User'

    StaffAuthResponse:
      type: object
      properties:
        token:
          type: string
        expires_in:
          type: integer
        staff:
          type: object
          properties:
            staff_id:
              type: string
              format: uuid
            email:
              type: string
            name:
              type: string
            role:
              type: string
              enum: [staff, admin]

    MobileGrantsResponse:
      type: object
      properties:
        key_id:
          type: string
          format: uuid
        secret_base_b64:
          type: string
          description: Base64-encoded secret for HKDF derivation
        grants:
          type: array
          items:
            type: object
            properties:
              grant_id:
                type: string
                format: uuid
              from_ts:
                type: integer
              to_ts:
                type: integer
              doors:
                type: array
                items:
                  type: object
                  properties:
                    door_id:
                      type: string
                      format: uuid
                    ble_id:
                      type: string

    AssignResponse:
      type: object
      properties:
        grant_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        from_ts:
          type: integer
        to_ts:
          type: integer
        doors:
          type: array
          items:
            type: object
            properties:
              door_id:
                type: string
                format: uuid
              ble_id:
                type: string

    Room:
      type: object
      properties:
        room_id:
          type: string
          format: uuid
        room_number:
          type: string
        label:
          type: string
        floor:
          type: integer
        status:
          type: string
          enum: [available, occupied, maintenance, locked]

    DoorStatus:
      type: object
      properties:
        door_id:
          type: string
          format: uuid
        room_number:
          type: string
        ble_id:
          type: string
        status:
          type: string
          enum: [online, offline, locked]
        is_online:
          type: boolean
        is_locked:
          type: boolean
        locked_until:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        fw_version:
          type: string
        capabilities:
          type: object
          properties:
            ble:
              type: boolean
            uwb:
              type: boolean
            bg_unlock:
              type: boolean

    AccessEvent:
      type: object
      properties:
        event_id:
          type: string
          format: uuid
        ts:
          type: string
          format: date-time
        door_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        result:
          type: string
          enum: [success, fail]
        error_code:
          type: integer
        user_name:
          type: string
        room_number:
          type: string
