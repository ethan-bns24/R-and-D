server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy backend API calls through the same frontend origin.
    # This avoids hardcoding localhost:4000 in the browser and works
    # whether users access the app via localhost or an external IP/DNS.
    location ~ ^/(v1|clients|tokens|auth|rooms|logs|health)(/|$) {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback for React routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
