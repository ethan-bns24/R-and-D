services:
  postgres:
    image: postgres:16-alpine
    container_name: grms-postgres
    environment:
      POSTGRES_USER: "grms"
      POSTGRES_PASSWORD: "grms"
      POSTGRES_DB: "grms"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grms -d grms"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grms-backend
    environment:
      PORT: "4000"
      DOORLINK_PORT: "4001"
      DATABASE_URL: "postgres://grms:grms@postgres:5432/grms?sslmode=disable"
      JWT_SECRET: "grms-secret-key-change-in-production"
      JWT_STAFF_SECRET: "grms-staff-secret-change-in-production"
      MASTER_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      DOOR_API_TOKEN: "door-token-mvp"
    ports:
      - "4000:4000"
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: grms-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: grms-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@grms.com"
      PGADMIN_DEFAULT_PASSWORD: "admin123"
    ports:
      - "5051:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  pgadmin_data:
