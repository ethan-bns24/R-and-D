services:
  postgres:
    image: postgres:16-alpine
    container_name: grms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: grms
      POSTGRES_USER: grms
      POSTGRES_PASSWORD: grms
    volumes:
      - ./backend/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grms -d grms"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grms-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+pg8000://grms:grms@postgres:5432/grms
      SEED_ON_START: "false"
      CORS_ORIGINS: http://localhost:5173,http://10.42.0.1:5173
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "18000:18000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:18000/health')\""]
      interval: 10s
      timeout: 3s
      retries: 10

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grms-seed
    profiles:
      - seed
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+pg8000://grms:grms@postgres:5432/grms
      SEED_ON_START: "false"
    command: ["python", "-m", "app.db.seed_runner"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: grms-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: grms-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    volumes:
      - ./backend/pgadmin_data:/var/lib/pgadmin
