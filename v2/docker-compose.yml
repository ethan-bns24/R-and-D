services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: v2-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: v2-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
